            // Drag and drop handlers
            const touchStartY = useRef(0);

            const handleDragStart = (e, index) => {
                setDraggedItem(index);
                e.dataTransfer.effectAllowed = 'move';
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (draggedItem === null) return;

                const newCategories = [...localCategories];
                const draggedCategory = newCategories[draggedItem];

                newCategories.splice(draggedItem, 1);
                newCategories.splice(index, 0, draggedCategory);

                setLocalCategories(newCategories);
                setDraggedItem(index);
            };

            const handleDragEnd = async () => {
                setDraggedItem(null);

                // Update sort_order for all categories
                const updates = localCategories.map((cat, index) => ({
                    id: cat.id,
                    sort_order: index + 1
                }));

                await onReorder(updates);
            };

            // Touch drag handlers for mobile
            const handleTouchStart = (e, index) => {
                touchStartY.current = e.touches[0].clientY;
                setDraggedItem(index);
            };

            const handleTouchMove = (e) => {
                e.preventDefault();
                if (draggedItem === null) return;

                const touchY = e.touches[0].clientY;
                const elements = document.querySelectorAll('[data-cat-index]');
                for (let i = 0; i < elements.length; i++) {
                    const rect = elements[i].getBoundingClientRect();
                    if (touchY > rect.top && touchY < rect.bottom) {
                        const targetIndex = parseInt(elements[i].dataset.catIndex);
                        if (targetIndex !== draggedItem) {
                            const newCategories = [...localCategories];
                            const draggedCategory = newCategories[draggedItem];
                            newCategories.splice(draggedItem, 1);
                            newCategories.splice(targetIndex, 0, draggedCategory);
                            setLocalCategories(newCategories);
                            setDraggedItem(targetIndex);
                        }
                        break;
                    }
                }
            };

            const handleTouchEnd = () => {
                if (draggedItem !== null) {
                    handleDragEnd();
                }
            };

            return (
                <div className="h-full flex flex-col">
                    <div className="flex items-center px-5 pt-14 pb-5">
                        <button
                            onClick={onBack}
                            className="w-10 h-10 rounded-full bg-white/60 text-morandi-text flex items-center justify-center mr-4 hover:bg-white/80 transition-colors"
                        >
                            ←
                        </button>
                        <h1 className="text-morandi-text font-bold text-xl">分类管理</h1>
                    </div>

                    <div className="flex-1 overflow-y-auto px-5 pb-32">
                        <button
                            onClick={openAddModal}
                            className="w-full py-4 bg-gradient-to-r from-morandi-accent to-morandi-group2 text-white rounded-2xl font-semibold mb-6 flex items-center justify-center gap-2"
                        >
                            <span className="text-xl">+</span>
                            <span>新增分类</span>
                        </button>

                        {localCategories.map((cat, index) => (
                            <div
                                key={cat.id}
                                data-cat-index={index}
                                draggable={true}
                                onDragStart={(e) => handleDragStart(e, index)}
                                onDragOver={(e) => handleDragOver(e, index)}
                                onDragEnd={handleDragEnd}
                                onTouchStart={(e) => handleTouchStart(e, index)}
                                onTouchMove={handleTouchMove}
                                onTouchEnd={handleTouchEnd}
                                className={`drag-handle bg-white/80 backdrop-blur rounded-3xl p-4 mb-3 shadow-soft border border-white/60 transition-all cursor-move ${
                                    draggedItem === index ? 'dragging' : ''
                                }`}
                            >
                                <div className="flex items-center justify-between">
                                    <div className="flex items-center flex-1">
                                        <span className="text-morandi-textSecondary mr-3 text-lg">⋮⋮</span>
                                        <div
                                            className="w-12 h-12 rounded-2xl flex items-center justify-center mr-4 shadow-glow"
                                            style={{ background: `linear-gradient(135deg, ${cat.color}, ${cat.color}dd)` }}
                                        >
                                            <span className="text-2xl">{cat.emoji}</span>
                                        </div>
                                        <div className="flex-1">
                                            <h3 className="text-morandi-text font-bold">{cat.name}</h3>
                                            <p className="text-morandi-textSecondary text-sm">{getItemCount(cat.id)} 条内容</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => openEditModal(cat)}
                                            className="w-10 h-10 rounded-xl bg-morandi-bg text-morandi-text flex items-center justify-center hover:bg-morandi-card transition-colors"
                                        >
                                            ✏️
                                        </button>
                                        <button
                                            onClick={() => {
                                                if (confirm(`确定要删除「${cat.name}」吗？`)) {
                                                    onDelete(cat.id);
                                                }
                                            }}
                                            className="w-10 h-10 rounded-xl bg-morandi-error/20 text-morandi-error flex items-center justify-center hover:bg-morandi-error/30 transition-colors"
                                        >
                                            🗑️
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 新增/编辑弹窗 */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-end justify-center" style={{ zIndex: 200 }}>
                            <div className="bg-morandi-bg w-full rounded-t-[36px] p-6 slide-up shadow-2xl">
                                <div className="w-12 h-1.5 bg-morandi-card rounded-full mx-auto mb-6"></div>

                                <h2 className="text-morandi-text font-bold text-xl mb-5">
                                    {editingCategory ? '编辑分类' : '新增分类'}
                                </h2>

                                <div className="space-y-4">
                                    <div className="bg-white rounded-2xl p-4 shadow-soft border border-white/60">
                                        <label className="text-morandi-textSecondary text-sm font-medium mb-2 block">分类名称</label>
                                        <input
                                            type="text"
                                            value={formData.name}
                                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            placeholder="输入分类名称..."
                                            className="w-full outline-none text-morandi-text placeholder:text-morandi-textSecondary bg-transparent"
                                        />
                                    </div>

                                    <div className="bg-white rounded-2xl p-4 shadow-soft border border-white/60">
                                        <label className="text-morandi-textSecondary text-sm font-medium mb-3 block">选择图标</label>
                                        <div className="grid grid-cols-6 gap-2">
                                            {emojiOptions.map(emoji => (
                                                <button
                                                    key={emoji}
                                                    type="button"
                                                    onClick={() => setFormData({...formData, emoji})}
                                                    className={`w-12 h-12 rounded-xl text-xl flex items-center justify-center transition-all ${
                                                        formData.emoji === emoji
                                                            ? 'bg-morandi-accent text-white'
                                                            : 'bg-morandi-bg text-morandi-text'
                                                    }`}
                                                >
                                                    {emoji}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl p-4 shadow-soft border border-white/60">
                                        <label className="text-morandi-textSecondary text-sm font-medium mb-3 block">选择颜色</label>
                                        <div className="flex gap-3">
                                            {colorOptions.map(color => (
                                                <button
                                                    key={color}
                                                    type="button"
                                                    onClick={() => setFormData({...formData, color})}
                                                    className={`w-12 h-12 rounded-xl transition-all ${
                                                        formData.color === color
                                                            ? 'ring-4 ring-offset-2 ring-morandi-accent'
                                                            : ''
                                                    }`}
                                                    style={{ backgroundColor: color }}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button
                                        onClick={() => {
                                            setShowAddModal(false);
                                            setEditingCategory(null);
                                        }}
                                        className="flex-1 py-4 bg-morandi-card text-morandi-text rounded-2xl font-semibold"
                                    >
                                        取消
                                    </button>
                                    <button
                                        onClick={handleSubmit}
                                        disabled={!formData.name.trim()}
                                        className="flex-1 py-4 bg-gradient-to-r from-morandi-accent to-morandi-group2 text-white rounded-2xl font-semibold disabled:opacity-50"
                                    >
                                        {editingCategory ? '保存' : '创建'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==================== 成功提示 ====================
        const SuccessToast = ({ show, message }) => {
            if (!show) return null;
            return (
                <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-morandi-success text-morandi-text px-6 py-4 rounded-2xl shadow-lg scale-in flex items-center gap-2" style={{ zIndex: 400 }}>
                    <span className="text-lg">✓</span>
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        // ==================== 回收站页面 ====================
        const TrashScreen = ({ items, loading, onRestore, onBack }) => (
            <div className="h-full flex flex-col">
                <div className="px-5 pt-14 pb-4 flex items-center gap-3">
                    <button
                        onClick={onBack}
                        className="w-10 h-10 rounded-full bg-white/60 text-morandi-text flex items-center justify-center hover:bg-white/80 transition-colors"
                    >
                        ←
                    </button>
                    <h1 className="text-morandi-text font-bold text-2xl">🗑️ 回收站</h1>
                </div>

                <div className="flex-1 overflow-y-auto px-5 pb-32">
                    {loading ? (
                        <div className="flex justify-center py-12">
                            <div className="spinner-lg"></div>
                        </div>
                    ) : items.length === 0 ? (
                        <div className="flex flex-col items-center justify-center py-16">
                            <span className="text-6xl mb-4 opacity-50">✨</span>
                            <h3 className="text-morandi-text font-bold text-lg mb-2">回收站是空的</h3>
                            <p className="text-morandi-textSecondary text-sm">删除的事项会出现在这里</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {items.map(item => (
                                <div key={item.id} className="bg-white/80 rounded-2xl shadow-soft p-4 border border-white/60">
                                    <div className="flex items-center justify-between">
                                        <div className="flex-1 min-w-0">
                                            <h3 className="text-morandi-text font-semibold text-sm truncate">{item.title}</h3>
                                            <p className="text-morandi-textSecondary text-xs mt-1">
                                                {item.deleted_at ? new Date(item.deleted_at.replace(/Z$/, '').replace(/[+-]\d{2}:\d{2}$/, '')).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + ' 删除' : ''}
                                            </p>
                                        </div>
                                        <button
                                            onClick={() => onRestore(item)}
                                            className="ml-3 px-4 py-2 bg-morandi-accent/20 text-morandi-accent rounded-xl text-sm font-semibold hover:bg-morandi-accent/30 transition-colors flex-shrink-0"
                                        >
                                            恢复
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );

        // ==================== 设置页面 ====================
        const SettingsScreen = ({ user, onLogout, onTabChange, onInputClick, onManageCategories, onOpenTrash, autoArchive, onToggleAutoArchive }) => (
            <div className="h-full flex flex-col">
                <div className="px-5 pt-14 pb-5">
                    <h1 className="text-morandi-text font-bold text-2xl">⚙️ 设置</h1>
                </div>

                <div className="flex-1 overflow-y-auto px-5 pb-32">
                    <div className="bg-white/80 backdrop-blur rounded-3xl p-5 mb-4 shadow-soft border border-white/60">
                        <div className="flex items-center mb-4">
                            <div className="w-14 h-14 rounded-full bg-gradient-to-br from-morandi-accent to-morandi-group2 flex items-center justify-center mr-4">
                                <span className="text-white text-2xl font-bold">
                                    {user?.email?.[0]?.toUpperCase() || 'U'}
                                </span>
                            </div>
                            <div>
                                <h3 className="text-morandi-text font-bold">{user?.email || '用户'}</h3>
                                <p className="text-morandi-textSecondary text-sm">已登录</p>
                            </div>
                        </div>
                    </div>

                    <button
                        onClick={onManageCategories}
                        className="w-full bg-white/80 text-morandi-text py-4 rounded-2xl font-semibold border border-white/60 mb-3 flex items-center justify-center gap-2 shadow-soft"
                    >
                        <span>📁</span>
                        <span>管理分类</span>
                    </button>

                    <button
                        onClick={onOpenTrash}
                        className="w-full bg-white/80 text-morandi-text py-4 rounded-2xl font-semibold border border-white/60 mb-3 flex items-center justify-center gap-2 shadow-soft"
                    >
                        <span>🗑️</span>
                        <span>回收站</span>
                    </button>

                    <div className="bg-white/80 backdrop-blur rounded-2xl p-4 mb-3 shadow-soft border border-white/60 flex items-center justify-between">
                        <div>
                            <div className="text-morandi-text font-semibold">自动归档</div>
                            <div className="text-morandi-textSecondary text-sm">完成后、过期的待办和日程自动隐藏</div>
                        </div>
                        <div
                            className={`toggle-switch ${autoArchive ? 'active' : ''}`}
                            onClick={onToggleAutoArchive}
                        />
                    </div>

                    <button
                        onClick={onLogout}
                        className="w-full bg-morandi-error/20 text-morandi-error py-4 rounded-2xl font-semibold border border-morandi-error/30"
                    >
                        退出登录
                    </button>
                </div>

                <BottomNav activeTab="settings" onTabChange={onTabChange} onInputClick={onInputClick} />
            </div>
        );

        // ==================== 主应用 ====================
        const App = () => {
            // Auth state
            const [user, setUser] = useState(null);
            const [token, setToken] = useState(null);
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState('');
            const [showForgotPassword, setShowForgotPassword] = useState(false);

            // Data state
            const [categories, setCategories] = useState([]);
            const [items, setItems] = useState([]);
            const [categoriesLoading, setCategoriesLoading] = useState(false);
            const [itemsLoading, setItemsLoading] = useState(false);
            const [dataError, setDataError] = useState('');

            // Trash state
            const [trashItems, setTrashItems] = useState([]);
            const [trashLoading, setTrashLoading] = useState(false);

            // UI state
            const [screen, setScreen] = useState('home');
            const [activeTab, setActiveTab] = useState('home');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [searchValue, setSearchValue] = useState('');
            const [showInput, setShowInput] = useState(false);
            const [inputValue, setInputValue] = useState('');
            const [saving, setSaving] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [successMessage, setSuccessMessage] = useState('');
            const [showItemDetail, setShowItemDetail] = useState(false);
            const [savingItem, setSavingItem] = useState(false);

            // Auto archive state
            const [autoArchive, setAutoArchive] = useState(() => {
                return localStorage.getItem('sortie_auto_archive') === 'true';
            });

            // AI confirm state
            const [aiPreviewResult, setAiPreviewResult] = useState(null);
            const [showAIConfirm, setShowAIConfirm] = useState(false);
            const [aiConfirmContent, setAiConfirmContent] = useState('');

            // Signup verify hint
            const [signUpEmail, setSignUpEmail] = useState(null);

            // Load data from localStorage on mount
            useEffect(() => {
                // Check for auth callback from email verification redirect
                const hash = window.location.hash;
                if (hash && hash.includes('access_token')) {
                    const params = new URLSearchParams(hash.substring(1));
                    const accessToken = params.get('access_token');
                    if (accessToken) {
                        setToken(accessToken);
                        localStorage.setItem('sortie_token', accessToken);
                        // Clean up URL
                        window.history.replaceState(null, '', window.location.pathname);
                        // Fetch user info
                        apiRequest('/auth/v1/user', { method: 'GET' }, accessToken).then(userData => {
                            setUser(userData);
                            localStorage.setItem('sortie_user', JSON.stringify(userData));
                            loadData(accessToken).catch(() => {});
                            showSuccessToast('邮箱验证成功');
                        }).catch(() => {
                            window.history.replaceState(null, '', window.location.pathname);
                        });
                        return;
                    }
                }

                const savedToken = localStorage.getItem('sortie_token');
                const savedUser = localStorage.getItem('sortie_user');

                if (savedToken && savedUser) {
                    setToken(savedToken);
                    try { setUser(JSON.parse(savedUser)); } catch(e) { localStorage.removeItem('sortie_user'); }
                    // Try to load data, if JWT expires it will be handled
                    loadData(savedToken).catch(() => {
                        // JWT already handled in loadData
                    });
                }
            }, []);

            // Show success message
            const showSuccessToast = (msg) => {
                setSuccessMessage(msg);
                setShowSuccess(true);
                setTimeout(() => setShowSuccess(false), 2000);
            };

            // Login handler
            const handleLogin = async (email, password, isSignUp) => {
                setAuthLoading(true);
                setAuthError('');

                try {
                    const redirectUrl = window.location.origin + window.location.pathname;
                    const endpoint = isSignUp
                        ? '/auth/v1/signup?redirect_to=' + encodeURIComponent(redirectUrl)
                        : '/auth/v1/token?grant_type=password';
                    const body = isSignUp
                        ? { email, password, data: { full_name: '用户' } }
                        : { email, password };

                    const data = await apiRequest(endpoint, {
                        method: 'POST',
                        body: JSON.stringify(body)
                    });

                    if (isSignUp) {
                        // Signup successful - show verification hint, don't try to establish session
                        setSignUpEmail(email);
                        return;
                    }

                    const newToken = data.access_token || data.token?.access_token;
                    const newUser = data.user;

                    setToken(newToken);
                    setUser(newUser);

                    localStorage.setItem('sortie_token', newToken);
                    localStorage.setItem('sortie_user', JSON.stringify(newUser));

                    await loadData(newToken);
                } catch (err) {
                    setAuthError(err.message || '认证失败，请重试');
                } finally {
                    setAuthLoading(false);
                }
            };

            // Handle JWT expiration
            const handleJWTExpired = () => {
                localStorage.removeItem('sortie_token');
                localStorage.removeItem('sortie_user');
                setToken(null);
                setUser(null);
                setCategories([]);
                setItems([]);
                setScreen('home');
                setActiveTab('home');
                setAuthError('登录已过期，请重新登录');
            };

            // Create default categories for new users
            const createDefaultCategories = async (authToken) => {
                const defaultCategories = [
                    { name: '灵感', emoji: '💡', color: '#D4C8D4', sort_order: 1 },
                    { name: '工作', emoji: '💼', color: '#9CB4B8', sort_order: 2 },
                    { name: '学习', emoji: '📚', color: '#B8C4A8', sort_order: 3 },
                    { name: '生活', emoji: '🏠', color: '#C8B8A8', sort_order: 4 }
                ];

                try {
                    for (const cat of defaultCategories) {
                        await apiRequest('/rest/v1/categories', {
                            method: 'POST',
                            body: JSON.stringify({
                                user_id: user.id,
                                name: cat.name,
                                emoji: cat.emoji,
                                color: cat.color,
                                is_system: true,
                                sort_order: cat.sort_order
                            })
                        }, authToken);
                    }
                    console.log('默认分类创建成功');
                } catch (err) {
                    console.error('创建默认分类失败:', err);
                }
            };

            // Load data from Supabase
            const loadData = async (authToken) => {
                setCategoriesLoading(true);
                setItemsLoading(true);
                setDataError('');

                try {
                    const [catsData, itemsData] = await Promise.all([
                        apiRequest('/rest/v1/categories?select=*&order=sort_order.asc', { method: 'GET' }, authToken),
                        apiRequest('/rest/v1/items?select=*,categories(*)&deleted_at=is.null&archived_at=is.null&order=created_at.desc', { method: 'GET' }, authToken)
                    ]);

                    const categories = catsData || [];

                    // 如果没有分类，自动创建默认分类
                    if (categories.length === 0) {
                        console.log('检测到无分类，正在创建默认分类...');
                        await createDefaultCategories(authToken);
                        // 重新加载分类
                        const newCatsData = await apiRequest('/rest/v1/categories?select=*&order=sort_order.asc', { method: 'GET' }, authToken);
                        setCategories(newCatsData || []);
                    } else {
                        setCategories(categories);
                    }

                    setItems(itemsData || []);

                    // Auto-archive overdue todos and schedules when autoArchive is enabled
                    if (localStorage.getItem('sortie_auto_archive') === 'true' && itemsData && itemsData.length > 0) {
                        const now = new Date().toISOString();
                        const overdueIds = itemsData
                            .filter(i => {
                                if (i.item_type === 'todo') return !i.is_completed && i.scheduled_start && i.scheduled_start < now;
                                if (i.item_type === 'schedule') {
                                    const endTime = i.scheduled_end || i.scheduled_start;
                                    return endTime && endTime < now;
                                }
                                return false;
                            })
                            .map(i => i.id);
                        if (overdueIds.length > 0) {
                            apiRequest(`/rest/v1/items?id=in.(${overdueIds.join(',')})`, {
                                method: 'PATCH',
                                body: JSON.stringify({ archived_at: now, is_auto_archived: true })
                            }, authToken).then(() => {
                                loadData(authToken);
                            }).catch(err => {
                                console.error('自动归档过期项目失败:', err);
                            });
                        }
                    }
                } catch (err) {
                    // Check if JWT expired
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    setDataError(err.message || '加载数据失败');
                } finally {
                    setCategoriesLoading(false);
                    setItemsLoading(false);
                }
            };

            // Create new item
            const handleCreateItem = async (content) => {
                setSaving(true);
                setDataError('');

                try {
                    // 直接调用 Edge Function 的 content 模式获取 AI 解析结果
                    const functionUrl = `${SUPABASE_CONFIG.url}/functions/v1/ai-parse`;

                    const response = await fetch(functionUrl, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'apikey': SUPABASE_CONFIG.key,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ content })
                    });

                    let aiResult = null;
                    if (response.ok) {
                        const data = await response.json();
                        aiResult = data.result;
                    } else {
                        console.error('AI解析失败，使用默认值');
                    }

                    // 设置 AI 结果并显示确认页
                    const fallbackTitle = content.split('\n')[0].substring(0, 50);
                    if (aiResult && !aiResult.title) {
                        aiResult.title = fallbackTitle;
                    }
                    setAiPreviewResult(aiResult || { title: fallbackTitle, formatType: 'note', folderCategory: '💡灵感' });
                    setAiConfirmContent(content);
                    setShowAIConfirm(true);
                    setShowInput(false);
                    setInputValue('');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    // 即使 AI 失败，也用默认值显示确认页
                    setAiPreviewResult({ title: content.split('\n')[0].substring(0, 50), formatType: 'note', folderCategory: '💡灵感' });
                    setAiConfirmContent(content);
                    setShowAIConfirm(true);
                    setShowInput(false);
                    setInputValue('');
                } finally {
                    setSaving(false);
                }
            };

            // 用户确认保存
            const handleConfirmSave = async (confirmData) => {
                setSaving(true);
                setDataError('');

                try {
                    const newItem = {
                        user_id: user.id,
                        category_id: confirmData.categoryId,
                        title: confirmData.title,
                        content: aiConfirmContent,
                        item_type: confirmData.formatType,
                        source_type: 'ai_parsed'
                    };

                    // 根据格式类型添加特定字段
                    if (confirmData.formatType === 'todo' && confirmData.dueDate) {
                        newItem.scheduled_start = confirmData.dueDate;
                    }
                    if (confirmData.formatType === 'schedule') {
                        if (confirmData.startTime) newItem.scheduled_start = confirmData.startTime;
                        if (confirmData.endTime) newItem.scheduled_end = confirmData.endTime;
                        if (confirmData.location) newItem.location = confirmData.location;
                    }

                    await apiRequest('/rest/v1/items', {
                        method: 'POST',
                        body: JSON.stringify(newItem),
                        headers: {
                            Prefer: 'return=representation'
                        }
                    }, token);

                    setShowAIConfirm(false);
                    setAiPreviewResult(null);
                    setAiConfirmContent('');
                    showSuccessToast('保存成功！');
                    await loadData(token);
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    setDataError(err.message || '保存失败');
                } finally {
                    setSaving(false);
                }
            };

            // 触发AI解析（异步调用，不阻塞UI）
            const triggerAIParse = async (itemId) => {
                try {
                    const functionUrl = `${SUPABASE_CONFIG.url}/functions/v1/ai-parse`;

                    const response = await fetch(functionUrl, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'apikey': SUPABASE_CONFIG.key,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            itemId: itemId,
                            userId: user.id
                        })
                    });

                    if (response.ok) {
                        const result = await response.json();
                        console.log('AI解析完成:', result);
                        // 解析完成后重新加载数据
                        await loadData(token);
                        showSuccessToast('AI分析完成！');
                    } else {
                        const errorData = await response.json();
                        console.error('AI解析错误:', errorData);
                    }
                } catch (err) {
                    console.error('AI解析失败:', err);
                    // AI解析失败不影响用户使用，只是保持为note类型
                }
            };

            // Update item
            const handleUpdateItem = async (itemId, updateData) => {
                setSavingItem(true);
                setDataError('');

                try {
                    const patchData = {
                        title: updateData.title,
                        content: updateData.content,
                        category_id: updateData.categoryId,
                        item_type: updateData.formatType
                    };

                    // 根据格式类型添加特定字段
                    if (updateData.formatType === 'todo') {
                        if (updateData.dueDate) patchData.scheduled_start = updateData.dueDate;
                        patchData.is_completed = updateData.isCompleted;
                        if (updateData.isCompleted) {
                            patchData.completed_at = new Date().toISOString();
                        } else {
                            patchData.completed_at = null;
                        }
                    }
                    if (updateData.formatType === 'schedule') {
                        if (updateData.startTime) patchData.scheduled_start = updateData.startTime;
                        if (updateData.endTime) patchData.scheduled_end = updateData.endTime;
                        if (updateData.location) patchData.location = updateData.location;
                    }

                    await apiRequest(`/rest/v1/items?id=eq.${itemId}`, {
                        method: 'PATCH',
                        body: JSON.stringify(patchData)
                    }, token);

                    await loadData(token);
                    setShowItemDetail(false);
                    showSuccessToast('更新成功！');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        setShowItemDetail(false);
                        return;
                    }
                    setDataError(err.message || '更新失败');
                } finally {
                    setSavingItem(false);
                }
            };

            // Toggle todo complete
            const handleToggleComplete = async (item) => {
                try {
                    const patchData = {
                        is_completed: !item.is_completed,
                        completed_at: !item.is_completed ? new Date().toISOString() : null
                    };
                    // Auto-archive when completing a todo
                    if (autoArchive && !item.is_completed) {
                        patchData.archived_at = new Date().toISOString();
                        patchData.is_auto_archived = true;
                    }
                    await apiRequest(`/rest/v1/items?id=eq.${item.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify(patchData)
                    }, token);

                    await loadData(token);
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('更新失败: ' + err.message);
                }
            };

            // Delete item
            const handleDeleteItem = async (item) => {
                try {
                    // Soft delete
                    await apiRequest(`/rest/v1/items?id=eq.${item.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ deleted_at: new Date().toISOString() })
                    }, token);

                    await loadData(token);
                    showSuccessToast('已删除');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('删除失败: ' + err.message);
                }
            };

            // Load trash items
            const loadTrashItems = async () => {
                setTrashLoading(true);
                try {
                    const data = await apiRequest('/rest/v1/items?select=*&deleted_at=not.is.null&order=deleted_at.desc', {
                        method: 'GET'
                    }, token);
                    setTrashItems(data || []);
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    console.error('加载回收站失败:', err);
                } finally {
                    setTrashLoading(false);
                }
            };

            // Restore item from trash
            const handleRestoreItem = async (item) => {
                try {
                    await apiRequest(`/rest/v1/items?id=eq.${item.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ deleted_at: null })
                    }, token);

                    await Promise.all([loadData(token), loadTrashItems()]);
                    showSuccessToast('已恢复');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('恢复失败: ' + err.message);
                }
            };

            // Archive item (user manual archive)
            const handleArchiveItem = async (item) => {
                try {
                    await apiRequest(`/rest/v1/items?id=eq.${item.id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({ archived_at: new Date().toISOString(), is_auto_archived: false })
                    }, token);

                    await loadData(token);
                    showSuccessToast('已归档');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('归档失败: ' + err.message);
                }
            };

            // Toggle auto archive
            const handleToggleAutoArchive = () => {
                const newValue = !autoArchive;
                setAutoArchive(newValue);
                localStorage.setItem('sortie_auto_archive', String(newValue));
                if (!newValue) {
                    // Turning OFF: restore only auto-archived items
                    apiRequest('/rest/v1/items?is_auto_archived=is.true', {
                        method: 'PATCH',
                        body: JSON.stringify({ archived_at: null, is_auto_archived: false })
                    }, token).then(() => {
                        loadData(token);
                    }).catch(err => {
                        console.error('恢复自动归档事项失败:', err);
                    });
                } else {
                    // Turning ON: immediately auto-archive completed todos and overdue schedules
                    const now = new Date().toISOString();
                    const toArchiveIds = items
                        .filter(i => {
                            if (i.item_type === 'todo' && i.is_completed) return true;
                            if (i.item_type === 'schedule') {
                                const endTime = i.scheduled_end || i.scheduled_start;
                                return endTime && endTime < now;
                            }
                            return false;
                        })
                        .map(i => i.id);
                    if (toArchiveIds.length > 0) {
                        apiRequest(`/rest/v1/items?id=in.(${toArchiveIds.join(',')})`, {
                            method: 'PATCH',
                            body: JSON.stringify({ archived_at: now, is_auto_archived: true })
                        }, token).then(() => {
                            loadData(token);
                        }).catch(err => {
                            console.error('自动归档失败:', err);
                        });
                    }
                }
            };

            // Add category
            const handleAddCategory = async (data) => {
                try {
                    const maxSortOrder = categories.length > 0 ? Math.max(...categories.map(c => c.sort_order || 0)) : 0;
                    await apiRequest('/rest/v1/categories', {
                        method: 'POST',
                        body: JSON.stringify({
                            user_id: user.id,
                            name: data.name,
                            emoji: data.emoji,
                            color: data.color,
                            sort_order: maxSortOrder + 1,
                            is_system: false
                        })
                    }, token);
                    await loadData(token);
                    showSuccessToast('分类已创建');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('创建失败: ' + err.message);
                }
            };

            // Edit category
            const handleEditCategory = async (id, data) => {
                try {
                    await apiRequest(`/rest/v1/categories?id=eq.${id}`, {
                        method: 'PATCH',
                        body: JSON.stringify({
                            name: data.name,
                            emoji: data.emoji,
                            color: data.color
                        })
                    }, token);
                    await loadData(token);
                    showSuccessToast('分类已更新');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('更新失败: ' + err.message);
                }
            };

            // Delete category
            const handleDeleteCategory = async (id) => {
                try {
                    await apiRequest(`/rest/v1/categories?id=eq.${id}`, {
                        method: 'DELETE'
                    }, token);
                    await loadData(token);
                    showSuccessToast('分类已删除');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('删除失败: ' + err.message);
                }
            };

            // Reorder categories
            const handleReorderCategories = async (updates) => {
                try {
                    // Batch update all sort_orders
                    await Promise.all(updates.map(update =>
                        apiRequest(`/rest/v1/categories?id=eq.${update.id}`, {
                            method: 'PATCH',
                            body: JSON.stringify({ sort_order: update.sort_order })
                        }, token)
                    ));
                    await loadData(token);
                    showSuccessToast('顺序已更新');
                } catch (err) {
                    if (err.message === 'JWT_EXPIRED') {
                        handleJWTExpired();
                        return;
                    }
                    alert('更新顺序失败: ' + err.message);
                    await loadData(token); // Reload to restore original order
                }
            };

            // Logout handler
            const handleLogout = () => {
                localStorage.removeItem('sortie_token');
                localStorage.removeItem('sortie_user');
                setToken(null);
                setUser(null);
                setCategories([]);
                setItems([]);
                setScreen('home');
                setActiveTab('home');
            };

            // Tab change handler
            const handleTabChange = (tab) => {
                setActiveTab(tab);
                if (tab === 'settings') setScreen('settings');
                else if (tab === 'calendar') setScreen('calendar');
                else if (tab === 'files') setScreen('files');
                else setScreen('home');
            };

            // Filter items by category
            const getFilteredItems = (categoryId) => {
                return items.filter(item => item.category_id === categoryId);
            };

            // Handle item click
            const handleItemClick = (item) => {
                setSelectedItem(item);
                setShowItemDetail(true);
            };

            // Render loading screen
            if (authLoading) {
                return (
                    <div className="h-full flex flex-col items-center justify-center">
                        <div className="spinner-lg mb-4"></div>
                        <p className="text-morandi-textSecondary">加载中...</p>
                    </div>
                );
            }

            // Render login screen if not authenticated
            if (!user || !token) {
                if (showForgotPassword) {
                    return (
                        <div className="h-full">
                            <div className="notch"></div>
                            <ForgotPasswordScreen onBack={() => { setShowForgotPassword(false); setAuthError(''); }} />
                        </div>
                    );
                }
                return (
                    <div className="h-full">
                        <div className="notch"></div>
                        <LoginScreen
                            onLogin={handleLogin}
                            loading={authLoading}
                            error={authError}
                            onForgotPassword={() => { setShowForgotPassword(true); setAuthError(''); }}
                            signUpEmail={signUpEmail}
                            onDismissSignUpHint={() => setSignUpEmail(null)}
                        />
                    </div>
                );
            }

            // Render home screen
            const renderHome = () => (
                <div className="h-full flex flex-col">
                    <SearchBar
                        value={searchValue}
                        onChange={(e) => setSearchValue(e.target.value)}
                    />

                    {dataError && <ErrorBanner error={dataError} onRetry={() => loadData(token)} />}

                    <div className="flex-1 overflow-y-auto pb-32 pt-2">
                        <h3 className="text-morandi-text font-bold text-lg mb-4 px-5">分类</h3>

                        {categoriesLoading ? (
                            <div className="flex overflow-x-auto px-5 pb-4 horizontal-scroll">
                                <CategorySkeleton />
                                <CategorySkeleton />
                                <CategorySkeleton />
                            </div>
                        ) : categories.length === 0 ? (
                            <div className="px-5">
                                <EmptyState
                                    icon="📁"
                                    title="暂无分类"
                                    description="系统会自动创建默认分类"
                                />
                            </div>
                        ) : (
                            <div className="flex overflow-x-auto px-5 pb-4 horizontal-scroll" style={{ paddingRight: '20px' }}>
                                {categories.map((cat, idx) => (
                                    <CategoryCard
                                        key={cat.id}
                                        category={{ ...cat, count: items.filter(i => i.category_id === cat.id).length }}
                                        onClick={() => {
                                            setSelectedCategory(cat);
                                            setScreen('detail');
                                        }}
                                        delay={Math.min(idx + 1, 6)}
                                    />
                                ))}
                                <div style={{ width: '8px', flexShrink: 0 }}></div>
                            </div>
                        )}

                        <h3 className="text-morandi-text font-bold text-lg mb-4 px-5 mt-4">最近添加</h3>

                        {itemsLoading ? (
                            <div className="px-5">
                                <ItemSkeleton />
                                <ItemSkeleton />
                            </div>
                        ) : items.length === 0 ? (
                            <div className="px-5">
                                <EmptyState
                                    icon="✨"
                                    title="开始添加内容"
                                    description="点击下方 + 按钮添加第一条内容"
                                />
                            </div>
                        ) : (
                            <div className="px-5">
                                {items.slice(0, 5).map((item, idx) => (
                                    <div key={item.id} className="float-up" style={{ animationDelay: `${idx * 0.1}s`, opacity: 0 }}>
                                        <SwipeableItem
                                            item={item}
                                            onDelete={handleDeleteItem}
                                            onClick={handleItemClick}
                                            onToggleComplete={handleToggleComplete}
                                            onArchive={handleArchiveItem}
                                        >
                                            {item.item_type === 'todo' ? (
                                                <TodoItem item={item} onToggleComplete={handleToggleComplete} />
                                            ) : item.item_type === 'schedule' ? (
                                                <ScheduleItem item={item} />
                                            ) : (
                                                <NoteItem item={item} />
                                            )}
                                        </SwipeableItem>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <BottomNav
                        activeTab={activeTab}
                        onTabChange={handleTabChange}
                        onInputClick={() => setShowInput(true)}
                    />
                </div>
            );

            // Render detail screen
            const renderDetail = () => {
                const cat = selectedCategory;
                const catItems = getFilteredItems(cat?.id);

                return (
                    <div className="h-full flex flex-col">
                        <div className="flex items-center px-5 pt-14 pb-5">
                            <button
                                onClick={() => setScreen('home')}
                                className="w-10 h-10 rounded-full bg-white/60 text-morandi-text flex items-center justify-center mr-4 hover:bg-white/80 transition-colors"
                            >
                                ←
                            </button>
                            <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-morandi-accent to-morandi-group2 flex items-center justify-center mr-4 shadow-glow">
                                <span className="text-2xl">{cat?.emoji}</span>
                            </div>
                            <h1 className="text-morandi-text font-bold text-xl">{cat?.name}</h1>
                        </div>

                        <div className="flex-1 overflow-y-auto px-5 pb-32">
                            {itemsLoading ? (
                                <>
                                    <ItemSkeleton />
                                    <ItemSkeleton />
                                </>
                            ) : catItems.length === 0 ? (
                                <EmptyState
                                    icon="📭"
                                    title="暂无内容"
                                    description="这个分类还没有任何内容"
                                />
                            ) : (
                                catItems.map((item, idx) => (
                                    <div key={item.id} className="float-up" style={{ animationDelay: `${idx * 0.1}s`, opacity: 0 }}>
                                        <SwipeableItem
                                            item={item}
                                            onDelete={handleDeleteItem}
                                            onClick={handleItemClick}
                                            onToggleComplete={handleToggleComplete}
                                            onArchive={handleArchiveItem}
                                        >
                                            {item.item_type === 'todo' ? (
                                                <TodoItem item={item} onToggleComplete={handleToggleComplete} />
                                            ) : item.item_type === 'schedule' ? (
                                                <ScheduleItem item={item} />
                                            ) : (
                                                <NoteItem item={item} />
                                            )}
                                        </SwipeableItem>
                                    </div>
                                ))
                            )}
                        </div>

                        <BottomNav
                            activeTab={activeTab}
                            onTabChange={handleTabChange}
                            onInputClick={() => setShowInput(true)}
                        />
                    </div>
                );
            };

            // Render screens
            return (
                <div className="h-full flex flex-col relative overflow-hidden">
                    <div className="notch"></div>

                    {screen === 'home' && renderHome()}
                    {screen === 'detail' && renderDetail()}
                    {screen === 'settings' && (
                        <SettingsScreen
                            user={user}
                            onLogout={handleLogout}
                            onTabChange={handleTabChange}
                            onInputClick={() => setShowInput(true)}
                            onManageCategories={() => setScreen('categoryManage')}
                            onOpenTrash={() => { loadTrashItems(); setScreen('trash'); }}
                            autoArchive={autoArchive}
                            onToggleAutoArchive={handleToggleAutoArchive}
                        />
                    )}
                    {screen === 'categoryManage' && (
                        <CategoryManageScreen
                            categories={categories}
                            items={items}
                            token={token}
                            user={user}
                            onBack={() => setScreen('settings')}
                            onAdd={handleAddCategory}
                            onEdit={handleEditCategory}
                            onDelete={handleDeleteCategory}
                            onReorder={handleReorderCategories}
                        />
                    )}
                    {screen === 'trash' && (
                        <TrashScreen
                            items={trashItems}
                            loading={trashLoading}
                            onRestore={handleRestoreItem}
                            onBack={() => setScreen('settings')}
                        />
                    )}
                    {screen === 'calendar' && (
                        <CalendarView
                            items={items}
                            onItemClick={handleItemClick}
                            onToggleComplete={handleToggleComplete}
                            onDelete={handleDeleteItem}
                            activeTab={activeTab}
                            onTabChange={handleTabChange}
                            onInputClick={() => setShowInput(true)}
                            onArchive={handleArchiveItem}
                        />
                    )}
                    {screen === 'files' && (
                        <div className="h-full flex items-center justify-center">
                            <EmptyState icon="📂" title="文件管理" description="即将推出" />
                            <BottomNav activeTab={activeTab} onTabChange={handleTabChange} onInputClick={() => setShowInput(true)} />
                        </div>
                    )}

                    <InputModal
                        show={showInput}
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        onSubmit={handleCreateItem}
                        loading={saving}
                        onClose={() => {
                            setShowInput(false);
                            setInputValue('');
                        }}
                    />

                    <AIConfirmScreen
                        show={showAIConfirm}
                        aiResult={aiPreviewResult}
                        content={aiConfirmContent}
                        categories={categories}
                        onConfirm={handleConfirmSave}
                        onCancel={() => {
                            setShowAIConfirm(false);
                            setAiPreviewResult(null);
                            setAiConfirmContent('');
                        }}
                        loading={saving}
                    />

                    <ItemDetailModal
                        show={showItemDetail}
                        item={selectedItem}
                        onClose={() => setShowItemDetail(false)}
                        onSave={handleUpdateItem}
                        onDelete={handleDeleteItem}
                        loading={savingItem}
                        categories={categories}
                        onArchive={handleArchiveItem}
                    />

                    <SuccessToast show={showSuccess} message={successMessage} />
                </div>
            );
        };

        // ==================== Error Boundary ====================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }
            static getDerivedStateFromError() {
                return { hasError: true };
            }
            componentDidCatch(error, info) {
                console.error('App error:', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '40px 20px', textAlign: 'center', color: '#4A4540' }}>
                            <p style={{ fontSize: '48px', marginBottom: '16px' }}>⚠️</p>
                            <p style={{ fontWeight: '600', marginBottom: '8px' }}>页面加载出错</p>
                            <p style={{ fontSize: '14px', color: '#9B958C', marginBottom: '20px' }}>请尝试清除浏览器缓存后刷新页面</p>
                            <button onClick={() => window.location.reload()}
                                style={{ padding: '10px 24px', borderRadius: '16px', background: '#9CB4B8', color: 'white', border: 'none', fontWeight: '600' }}>
                                刷新页面
                            </button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
</html>
